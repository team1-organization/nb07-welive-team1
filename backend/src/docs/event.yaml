  paths:
    /api/event:
      get:
        security:
          - bearerAuth: []
        tags:
          - "Events"
        summary: "이벤트 목록 조회"
        description: "연도와 월을 기준으로 아파트의 이벤트(NOTICE, POLL) 목록을 조회합니다."
        parameters:
          - name: apartmentId
            in: query
            required: true
            description: "아파트 고유 ID"
            schema:
              type: string
              example: "1"
          - name: year
            in: query
            required: true
            description: "조회할 연도"
            schema:
              type: integer
              example: 2025
          - name: month
            in: query
            required: true
            description: "조회할 월 (1~12)"
            schema:
              type: integer
              minimum: 1
              maximum: 12
              example: 6
        responses:
          '200':
            description: "이벤트 목록 조회 성공"
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/EventListItem"

      put:
        security:
          - bearerAuth: []
        tags:
          - "Events"
        summary: "이벤트 생성 또는 업데이트"
        description: "게시글(NOTICE 또는 POLL)의 일정 정보를 생성하거나 최신 정보로 업데이트합니다."
        parameters:
          - name: boardType
            in: query
            required: true
            description: "게시판 종류"
            schema:
              type: string
              enum: [NOTICE, POLL, COMPLAINT]
          - name: boardId
            in: query
            required: true
            description: "해당 게시글의 고유 ID"
            schema:
              type: string
              example: "01975d4f-f44c-7f82-b765-eb294c888fed"
          - name: startDate
            in: query
            required: true
            description: "이벤트 시작 날짜 및 시간 (ISO 형식)"
            schema:
              type: string
              format: date-time
          - name: endDate
            in: query
            required: true
            description: "이벤트 종료 날짜 및 시간 (ISO 형식)"
            schema:
              type: string
              format: date-time
        responses:
          '204':
            description: "이벤트 생성/업데이트 성공"

    /api/event/{eventId}:
      delete:
        security:
          - bearerAuth: []
        tags:
          - "Events"
        summary: "이벤트 삭제"
        description: "특정 이벤트 ID를 기반으로 일정을 삭제합니다."
        parameters:
          - name: eventId
            in: path
            required: true
            description: "삭제할 이벤트의 UUID"
            schema:
              type: string
              format: uuid
        responses:
          '200':
            description: "이벤트 삭제 성공"
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: "이벤트가 삭제되었습니다."
                    data:
                      $ref: "#/components/schemas/EventDetail"

  components:
    schemas:
      EventListItem:
        type: object
        properties:
          id:
            type: string
            example: "eventId"
          start:
            type: string
            format: date-time
            example: "2025-06-13T00:00:00.000Z"
          end:
            type: string
            format: date-time
            example: "2025-06-15T23:59:59.999Z"
          title:
            type: string
            example: "입주민 총회 안내"
          category:
            type: string
            example: "GENERAL"
          type:
            type: string
            enum: [NOTICE, POLL]
            example: "NOTICE"

      EventDetail:
        type: object
        properties:
          id:
            type: string
            format: uuid
          startDate:
            type: string
            format: date-time
          endDate:
            type: string
            format: date-time
          boardType:
            type: string
            enum: [NOTICE, POLL]
          noticeId:
            type: string
            nullable: true
          pollId:
            type: string
            nullable: true