/api/users/me:
  patch:
    security:
      - bearerAuth: []
    tags:
      - "Users"
    summary: "[모든 사용자] 개인정보 수정"
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              currentPassword:
                type: string
                description: "비밀번호 변경 시 필수"
              newPassword:
                type: string
                description: "새 비밀번호"
              file:
                type: string
                format: binary
                description: "아바타 이미지"
    responses:
      200:
        description: "프로필 수정 성공"
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "홍길동님의 정보가 성공적으로 업데이트되었습니다. 다시 로그인해주세요."