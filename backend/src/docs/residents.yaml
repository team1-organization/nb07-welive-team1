tags:
    - name: Residents
      description: 입주민 관리

paths:
    /api/residents:
        get:
            tags:
                - Residents
            summary: '[관리자] 입주민 목록 조회'
            description: 등록한 아파트의 입주민 목록을 조회합니다.
            security:
                - bearerAuth: []
            parameters:
                - in: query
                  name: page
                  required: false
                  description: '페이지 번호 (기본값 : 1)'
                  schema:
                      type: integer
                      default: 1
                      minimum: 1
                - in: query
                  name: limit
                  required: false
                  description: '페이지 별 아이템 수 (기본값 : 20, 최대 100개)'
                  schema:
                      type: integer
                      default: 20
                      minimum: 1
                      maximum: 100
                - in: query
                  name: building
                  required: false
                  description: 동
                  schema:
                      type: string
                - in: query
                  name: unitNumber
                  required: false
                  description: 호수
                  schema:
                      type: string
                - in: query
                  name: residenceStatus
                  required: false
                  description: 거주 여부
                  schema:
                      $ref: '#/components/schemas/ResidenceStatus'
                - in: query
                  name: isRegistered
                  required: false
                  description: 위리브 가입 여부
                  schema:
                      type: boolean
                - in: query
                  name: keyword
                  required: false
                  description: 검색어(이름, 연락처)
                  schema:
                      type: string
            responses:
                '200':
                    description: 입주민 목록 조회 성공
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ResidentListResponseDto'
                            example:
                                residents:
                                    - id: 'string'
                                      userId: null
                                      building: 'string'
                                      unitNumber: 'string'
                                      contact: 'string'
                                      name: 'string'
                                      email: null
                                      residenceStatus: RESIDENCE
                                      isHouseholder: HOUSEHOLDER
                                      isRegistered: true
                                      approvalStatus: PENDING
                                message: 'string'
                                count: 0
                                totalCount: 0
                '400':
                    description: 입주민 목록 조회 실패

        post:
            tags:
                - Residents
            summary: '[관리자] 입주민 리소스 생성(개별 등록)'
            description: 입주민 명부를 개별 등록합니다.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateOneResidentDto'
                        example:
                            building: '101'
                            unitNumber: '101'
                            contact: '01055320446'
                            name: '홍길동'
                            isHouseholder: HOUSEHOLDER
            responses:
                '201':
                    description: 입주민 리소스 생성(개별 등록) 성공
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ResidentResponseDto'
                            example:
                                id: 'string'
                                userId: null
                                building: 'string'
                                unitNumber: 'string'
                                contact: 'string'
                                name: 'string'
                                email: null
                                residenceStatus: RESIDENCE
                                isHouseholder: HOUSEHOLDER
                                isRegistered: true
                                approvalStatus: PENDING
                '400':
                    description: 입주민 리소스 생성(개별 등록) 실패

    /api/residents/from-users/{userId}:
        post:
            tags:
                - Residents
            summary: '[관리자] 사용자로부터 입주민 리소스 생성'
            description: 사용자 정보를 기반으로 입주민 리소스를 생성합니다.
            security:
                - bearerAuth: []
            parameters:
                - in: path
                  name: userId
                  required: true
                  description: userId
                  schema:
                      type: string
            responses:
                '201':
                    description: 사용자로부터 입주민 리소스 생성 성공
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ResidentResponseDto'
                            example:
                                id: 'string'
                                userId: 'string'
                                building: 'string'
                                unitNumber: 'string'
                                contact: 'string'
                                name: 'string'
                                email: 'string'
                                residenceStatus: RESIDENCE
                                isHouseholder: HOUSEHOLDER
                                isRegistered: true
                                approvalStatus: PENDING
                '400':
                    description: 사용자로부터 입주민 리소스 생성 실패

    /api/residents/file/template:
        get:
            tags:
                - Residents
            summary: '[관리자] 입주민 업로드 템플릿 다운로드'
            description: 입주민 업로드용 템플릿 CSV 파일을 다운로드합니다.
            security:
                - bearerAuth: []
            responses:
                '200':
                    description: 입주민 업로드 템플릿 다운로드 성공
                    headers:
                        Content-Type:
                            description: CSV 파일 컨텐츠 타입
                            schema:
                                type: string
                                example: text/csv; charset=utf-8
                        Content-Disposition:
                            description: 파일 다운로드를 위한 헤더
                            schema:
                                type: string
                                example: attachment; filename="residents.csv"; filename*=UTF-8''입주민명부_템플릿.csv
                    content:
                        text/csv:
                            schema:
                                type: string
                            example: 'string'
                '400':
                    description: 입주민 업로드 템플릿 다운로드 실패
                '500':
                    description: 입주민 업로드 템플릿 다운로드 실패(서버 오류)

    /api/residents/from-file:
        post:
            tags:
                - Residents
            summary: '[관리자] 파일로부터 입주민 리소스 생성'
            description: CSV 파일로 입주민 명부를 등록합니다.
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            required:
                                - file
                            properties:
                                file:
                                    type: string
                                    format: binary
                                    description: CSV 파일 업로드
            responses:
                '201':
                    description: 파일로부터 입주민 리소스 생성 성공
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/BulkOperationResponseDto'
                            example:
                                message: 5명의 입주민이 등록되었습니다
                                count: 5
                '400':
                    description: 파일로부터 입주민 리소스 생성 실패

    /api/residents/file:
        get:
            tags:
                - Residents
            summary: '[관리자] 입주민 목록 파일 다운로드'
            description: 입주민 목록을 CSV 파일로 다운로드합니다.
            security:
                - bearerAuth: []
            parameters:
                - in: query
                  name: page
                  required: false
                  description: '페이지 번호 (기본값 : 1)'
                  schema:
                      type: integer
                      default: 1
                      minimum: 1
                - in: query
                  name: limit
                  required: false
                  description: '페이지 별 아이템 수 (기본값 : 20, 최대 100개)'
                  schema:
                      type: integer
                      default: 20
                      minimum: 1
                      maximum: 100
                - in: query
                  name: building
                  required: false
                  description: 동
                  schema:
                      type: string
                - in: query
                  name: unitNumber
                  required: false
                  description: 호수
                  schema:
                      type: string
                - in: query
                  name: residenceStatus
                  required: false
                  description: 거주 여부
                  schema:
                      $ref: '#/components/schemas/ResidenceStatus'
                - in: query
                  name: isRegistered
                  required: false
                  description: 위리브 가입 여부
                  schema:
                      type: boolean
                - in: query
                  name: keyword
                  required: false
                  description: 검색어(이름, 연락처)
                  schema:
                      type: string
            responses:
                '200':
                    description: 입주민 목록 파일 다운로드 성공
                    headers:
                        Content-Type:
                            description: CSV 파일 컨텐츠 타입
                            schema:
                                type: string
                                example: text/csv; charset=utf-8
                        Content-Disposition:
                            description: 파일 다운로드를 위한 헤더
                            schema:
                                type: string
                                example: attachment; filename="residents.csv"; filename*=UTF-8''입주민명부_YYYYMMDD_HHMMSS.csv
                    content:
                        text/csv:
                            schema:
                                type: string
                            example: 'string'
                '400':
                    description: 입주민 목록 파일 다운로드 실패
                '401':
                    description: 입주민 목록 파일 다운로드 실패(권한 없음)
                '500':
                    description: 입주민 목록 파일 다운로드 실패(서버 오류)

    /api/residents/{id}:
        get:
            tags:
                - Residents
            summary: '[관리자] 입주민 상세 조회'
            description: 입주민 상세 정보를 조회합니다.
            security:
                - bearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  description: id
                  schema:
                      type: string
            responses:
                '200':
                    description: 입주민 상세 조회 성공
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ResidentResponseDto'
                            example:
                                id: 'string'
                                userId: null
                                building: 'string'
                                unitNumber: 'string'
                                contact: 'string'
                                name: 'string'
                                email: null
                                residenceStatus: RESIDENCE
                                isHouseholder: HOUSEHOLDER
                                isRegistered: true
                                approvalStatus: PENDING
                '400':
                    description: 입주민 상세 조회 실패

        patch:
            tags:
                - Residents
            summary: '[관리자] 입주민 정보 수정'
            description: 입주민 정보를 수정합니다.
            security:
                - bearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  description: id
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateResidentDto'
                        example:
                            building: '101'
                            unitNumber: '101'
                            contact: '01076550771'
                            name: '홍길동'
                            isHouseholder: HOUSEHOLDER
            responses:
                '200':
                    description: 입주민 정보 수정 성공
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ResidentResponseDto'
                            example:
                                id: 'string'
                                userId: null
                                building: 'string'
                                unitNumber: 'string'
                                contact: 'string'
                                name: 'string'
                                email: null
                                residenceStatus: RESIDENCE
                                isHouseholder: HOUSEHOLDER
                                isRegistered: true
                                approvalStatus: PENDING
                '400':
                    description: 입주민 정보 수정 실패

        delete:
            tags:
                - Residents
            summary: '[관리자] 입주민 정보 삭제'
            description: 입주민 정보를 삭제합니다.
            security:
                - bearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  description: id
                  schema:
                      type: string
            responses:
                '200':
                    description: 입주민 정보 삭제 성공
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DeleteResidentResponseDto'
                            example:
                                message: '작업이 성공적으로 완료되었습니다'
                '400':
                    description: 입주민 정보 삭제 실패

components:
    schemas:
        ResidenceStatus:
            type: string
            enum:
                - RESIDENCE
                - NO_RESIDENCE

        HouseholdType:
            type: string
            enum:
                - HOUSEHOLDER
                - HOUSEMEMBER

        ApprovalStatus:
            type: string
            enum:
                - PENDING
                - APPROVED
                - REJECTED

        ResidentResponseDto:
            type: object
            properties:
                id:
                    type: string
                userId:
                    type: string
                    nullable: true
                building:
                    type: string
                unitNumber:
                    type: string
                contact:
                    type: string
                name:
                    type: string
                email:
                    type: string
                    nullable: true
                residenceStatus:
                    $ref: '#/components/schemas/ResidenceStatus'
                isHouseholder:
                    $ref: '#/components/schemas/HouseholdType'
                isRegistered:
                    type: boolean
                approvalStatus:
                    $ref: '#/components/schemas/ApprovalStatus'

        ResidentListResponseDto:
            type: object
            properties:
                residents:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResidentResponseDto'
                message:
                    type: string
                count:
                    type: integer
                totalCount:
                    type: integer

        BulkOperationResponseDto:
            type: object
            properties:
                message:
                    type: string
                count:
                    type: integer

        DeleteResidentResponseDto:
            type: object
            properties:
                message:
                    type: string

        CreateOneResidentDto:
            type: object
            required:
                - building
                - unitNumber
                - contact
                - name
                - isHouseholder
            properties:
                building:
                    type: string
                unitNumber:
                    type: string
                contact:
                    type: string
                name:
                    type: string
                isHouseholder:
                    $ref: '#/components/schemas/HouseholdType'

        UpdateResidentDto:
            type: object
            minProperties: 1
            properties:
                building:
                    type: string
                unitNumber:
                    type: string
                contact:
                    type: string
                name:
                    type: string
                isHouseholder:
                    $ref: '#/components/schemas/HouseholdType'
